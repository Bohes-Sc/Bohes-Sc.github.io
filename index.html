<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AI Time</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
    body { background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
    #app { width: 100%; max-width: 1100px; height: 90vh; max-height: 900px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 40px; box-shadow: 0 25px 50px -8px rgba(0, 20, 30, 0.25); border: 1px solid rgba(255,255,255,0.5); overflow: hidden; display: flex; flex-direction: column; position: relative; }
    .nav-header { padding: 20px 24px 8px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .nav-header h1 { font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #1e3c72, #2a5298); -webkit-background-clip: text; background-clip: text; color: transparent; flex: 1; }
    .back-btn, .cloud-refresh-btn { background: white; border: none; width: 44px; height: 44px; border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); color: #1e3c72; font-size: 1.4rem; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.8); }
    .back-btn:hover, .cloud-refresh-btn:hover { background: #2a5298; color: white; }
    .view-container { flex: 1; padding: 24px; overflow-y: auto; }
    .home-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; padding: 16px 8px; }
    .big-btn { background: white; border-radius: 32px; padding: 32px 16px; box-shadow: 0 12px 24px -8px rgba(0,32,64,0.12); border: 1px solid rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; gap: 16px; cursor: pointer; transition: 0.2s; color: #1e2f4b; }
    .big-btn i { font-size: 3.5rem; color: #2a5298; }
    .big-btn span { font-size: 1.8rem; font-weight: 600; }
    .big-btn:hover { transform: translateY(-6px); box-shadow: 0 24px 36px -12px #1e3c7250; background: #f0f7ff; }
    .part-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 16px; }
    .part-card { background: white; border-radius: 28px; padding: 24px 28px; flex: 1 0 180px; box-shadow: 0 8px 18px rgba(0,0,0,0.05); text-align: center; cursor: pointer; transition: 0.15s; }
    .part-card i { font-size: 2.5rem; color: #2e5a9c; margin-bottom: 12px; }
    .part-card h3 { font-size: 1.8rem; font-weight: 600; }
    .games-list, .aitalk-list { display: flex; flex-direction: column; gap: 16px; margin: 24px 0; }
    .game-btn, .aitalk-btn { background: white; padding: 18px 24px; border-radius: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid #eef4ff; font-size: 1.3rem; font-weight: 500; color: #10355e; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.15s; }
    .game-btn i, .aitalk-btn i { color: #2a5298; }
    .game-btn:hover, .aitalk-btn:hover { background: #e3efff; }
    .iframe-container { margin-top: 28px; background: #ffffffc0; border-radius: 36px; padding: 20px; box-shadow: inset 0 1px 4px #00000008, 0 8px 18px #00000010; backdrop-filter: blur(4px); text-align: center; }
    iframe { border-radius: 24px; background: white; width: 100%; max-width: 500px; height: 380px; border: none; }
    .setting-section { background: white; border-radius: 32px; padding: 24px; margin-bottom: 30px; box-shadow: 0 6px 14px #00000008; }
    .setting-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; color: #1e3c72; display: flex; align-items: center; gap: 8px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-weight: 500; margin-bottom: 6px; color: #2c3e50; }
    .input-group input, .input-group textarea { width: 100%; padding: 14px 18px; border-radius: 40px; border: 1.5px solid #dbe4f0; font-size: 1rem; background: #fafcff; }
    .input-group textarea { border-radius: 28px; resize: vertical; font-family: monospace; }
    .input-group input:focus, .input-group textarea:focus { border-color: #2a5298; outline: none; background: white; }
    .part-editor, .aitalk-editor { background: #f2f8ff; border-radius: 28px; padding: 20px; margin-top: 20px; }
    .game-editor-item, .aitalk-editor-item { background: white; border-radius: 24px; padding: 16px; margin-bottom: 14px; border: 1px solid #cbddec; }
    .btn-icon { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #406e9e; padding: 8px; border-radius: 40px; }
    .btn-icon:hover { background: #d4e2f5; }
    .btn-primary { background: #1e3c72; color: white; border: none; padding: 12px 24px; border-radius: 60px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 16px #1e3c7240; margin-right: 8px; }
    .btn-outline { background: transparent; border: 1.5px solid #1e3c72; color: #1e3c72; padding: 12px 24px; border-radius: 60px; font-weight: 600; cursor: pointer; }
    .flex-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .password-modal { position: fixed; top:0; left:0; width:100%; height:100%; background: #00000040; backdrop-filter: blur(6px); display: flex; justify-content: center; align-items: center; z-index: 999; }
    .modal-card { background: white; padding: 32px; border-radius: 48px; width: 90%; max-width: 400px; }
    .hidden { display: none !important; }
    .empty-message { color: #6b7f94; padding: 20px; font-style: italic; }
    #snackbar { visibility: hidden; min-width: 200px; background: #1e3c72; color: white; text-align: center; border-radius: 40px; padding: 14px 24px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; box-shadow: 0 10px 20px #00000020; }
    #snackbar.show { visibility: visible; animation: fadein 0.3s, fadeout 0.3s 2.5s; }
    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    .config-source-badge { background: #eef3fa; padding: 8px 16px; border-radius: 40px; font-size: 0.9rem; display: inline-block; margin-bottom: 16px; }
    /* 右下角 Setting 小按钮 */
    .setting-corner-btn { position: absolute; bottom: 24px; right: 24px; background: white; border: none; width: 48px; height: 48px; border-radius: 50%; box-shadow: 0 8px 16px rgba(0,0,0,0.12); color: #1e3c72; font-size: 1.4rem; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: 0.2s; border: 1px solid rgba(255,255,255,0.8); }
    .setting-corner-btn:hover { background: #1e3c72; color: white; }
  </style>
</head>
<body>
<div id="app">
  <div class="nav-header">
    <button class="back-btn" id="backButton"><i class="fas fa-arrow-left"></i></button>
    <h1>📘 AI Time</h1>
    <button class="cloud-refresh-btn" id="cloudRefreshBtn" title="从云端刷新最新配置"><i class="fas fa-cloud-upload-alt"></i></button>
  </div>
  <div id="viewContainer" class="view-container"></div>
  <!-- 右下角 Setting 小按钮（仅首页显示） -->
  <button id="settingCornerBtn" class="setting-corner-btn" title="设置"><i class="fas fa-cog"></i></button>
</div>
<div id="passwordModal" class="password-modal hidden">
  <div class="modal-card">
    <h2 style="margin-bottom:20px; color:#1e3c72;"><i class="fas fa-lock"></i> Enter Code</h2>
    <input type="password" id="passwordInput" placeholder="Setting password" style="width:100%; padding:16px; border-radius:60px; border:1.5px solid #ccc; margin-bottom:20px;">
    <div class="flex-row">
      <button class="btn-primary" id="submitPassword">Unlock</button>
      <button class="btn-outline" id="cancelPassword">Cancel</button>
    </div>
    <p id="passwordError" style="color:#c0392b; margin-top:12px;"></p>
  </div>
</div>
<div id="snackbar">⚙️ 操作完成</div>

<script>
  (function(){
    "use strict";

    // ---------- 云端配置 (JSONBin) ----------
    const BIN_ID = '69e9ed30856a68218963db64';
    const ACCESS_KEY = '$2a$10$.T0zBKjmDIqXJGF4G.Ex2.s/KO7JR20Nn9n.XOYrIrBhqXUskchU6';
    const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const DEFAULT_CONFIG = {
      settingPassword: "9014",
      aiTalkUrl: "https://weixin.qq.com/",
      classInUrl: "https://www.classin.com/",
      discussionUrl: "https://discussion.example.com/",   // 新增 Discussion 链接
      aiTalkButtons: [],
      gameParts: [
        { id: "part1", name: "Part 1", games: [ { id: "game1", name: "Wordwall Game", embedCode: `<iframe style="max-width:100%" src="https://wordwall.net/embed/fc41e69b25a747f0a439d228a56fcf59?themeId=1&templateId=3&fontStackId=0" width="500" height="380" frameborder="0" allowfullscreen></iframe>` } ] },
        { id: "part2", name: "Part 2", games: [] },
        { id: "part3", name: "Part 3", games: [] }
      ]
    };

    let config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    let currentView = 'home';
    let currentPartId = null;
    let settingAuthenticated = false;
    let passwordCallback = null;
    let configSource = 'local';

    const viewContainer = document.getElementById('viewContainer');
    const backButton = document.getElementById('backButton');
    const cloudRefreshBtn = document.getElementById('cloudRefreshBtn');
    const settingCornerBtn = document.getElementById('settingCornerBtn');
    const passwordModal = document.getElementById('passwordModal');
    const passwordInput = document.getElementById('passwordInput');
    const submitPassword = document.getElementById('submitPassword');
    const cancelPassword = document.getElementById('cancelPassword');
    const passwordError = document.getElementById('passwordError');
    const snackbar = document.getElementById('snackbar');

    function showSnackbar(text, isError = false) {
      snackbar.textContent = text || '⚙️ 操作完成';
      snackbar.style.background = isError ? '#b53b3b' : '#1e3c72';
      snackbar.classList.add('show');
      setTimeout(() => {
        snackbar.classList.remove('show');
        snackbar.style.background = '#1e3c72';
      }, 2800);
    }

    // 更新右下角 Setting 按钮可见性（仅首页显示）
    function updateSettingCornerVisibility() {
      if (currentView === 'home') {
        settingCornerBtn.classList.remove('hidden');
      } else {
        settingCornerBtn.classList.add('hidden');
      }
    }

    function normalizeConfig(cfg) {
      if (!cfg.aiTalkButtons || !Array.isArray(cfg.aiTalkButtons)) {
        cfg.aiTalkButtons = [];
        if (cfg.aiTalkUrl && cfg.aiTalkUrl.trim() !== '') {
          cfg.aiTalkButtons.push({
            id: generateId('aitalk'),
            name: 'AI Talk 链接',
            url: cfg.aiTalkUrl
          });
        }
      }
      if (!cfg.gameParts || !Array.isArray(cfg.gameParts)) {
        cfg.gameParts = DEFAULT_CONFIG.gameParts;
      }
      if (!cfg.discussionUrl) {
        cfg.discussionUrl = DEFAULT_CONFIG.discussionUrl;
      }
      return cfg;
    }

    async function loadConfigFromCloud(showSuccess = true) {
      try {
        if (showSuccess) showSnackbar('☁️ 正在从云端加载配置...');
        const response = await fetch(`${BIN_URL}/latest`, {
          headers: { 'X-Access-Key': ACCESS_KEY }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const cloudConfig = data.record;
        
        config = { ...DEFAULT_CONFIG, ...cloudConfig };
        normalizeConfig(config);
        configSource = 'cloud';
        
        localStorage.setItem('english_integrated_config', JSON.stringify(config));
        if (showSuccess) showSnackbar('✅ 云端配置加载成功');
        renderCurrentView();
        return true;
      } catch (error) {
        console.warn('云端加载失败', error);
        if (showSuccess) showSnackbar('⚠️ 云端连接失败，使用本地缓存', true);
        return false;
      }
    }

    function loadConfigFromStorage() {
      const stored = localStorage.getItem('english_integrated_config');
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          config = { ...DEFAULT_CONFIG, ...parsed };
          normalizeConfig(config);
          configSource = 'local';
          return;
        } catch (e) {}
      }
      config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
      normalizeConfig(config);
      configSource = 'default';
      saveConfigToStorage(true);
    }

    function saveConfigToStorage(silent = false) {
      localStorage.setItem('english_integrated_config', JSON.stringify(config));
      if (!silent && configSource !== 'cloud') configSource = 'local';
      if (!silent) showSnackbar('💾 已保存到本地');
    }

    let saveTimer;
    function debouncedSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveConfigToStorage(false), 300);
    }

    async function publishToCloud() {
      if (!settingAuthenticated) {
        showSnackbar('请先进入设置页面', true);
        return;
      }
      try {
        showSnackbar('☁️ 正在发布到云端...');
        const response = await fetch(BIN_URL, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Access-Key': ACCESS_KEY
          },
          body: JSON.stringify(config)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        configSource = 'cloud';
        localStorage.setItem('english_integrated_config', JSON.stringify(config));
        showSnackbar('🎉 发布成功！学生点击右上角☁️即可更新');
      } catch (error) {
        console.error('发布失败', error);
        showSnackbar('❌ 发布失败，请检查网络或 Bin 权限', true);
      }
    }

    function generateId(prefix = 'id') {
      return prefix + '-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    function setView(view, partId = null) {
      currentView = view;
      currentPartId = partId;
      updateSettingCornerVisibility();
      renderCurrentView();
    }

    function goBack() {
      if (currentView === 'home') return;
      if (currentView === 'aitalk' || currentView === 'game' || currentView === 'partDetail' || currentView === 'setting') {
        setView('home');
      } else {
        setView('home');
      }
    }

    function showPasswordModal(callback) {
      passwordCallback = callback;
      passwordModal.classList.remove('hidden');
      passwordInput.value = '';
      passwordError.innerText = '';
      passwordInput.focus();
    }

    function hidePasswordModal() {
      passwordModal.classList.add('hidden');
    }

    function enterSetting() {
      if (settingAuthenticated) setView('setting');
      else showPasswordModal(pwd => {
        if (pwd === config.settingPassword) { settingAuthenticated = true; hidePasswordModal(); setView('setting'); }
        else passwordError.innerText = '密码错误';
      });
    }

    // ---------- 渲染视图 ----------
    function renderHomeView() {
      viewContainer.innerHTML = `
        <div class="home-grid">
          <div class="big-btn" id="navGame"><i class="fas fa-gamepad"></i><span>Game</span></div>
          <div class="big-btn" id="navAITalk"><i class="fas fa-comment-dots"></i><span>Role-Play</span></div>
          <div class="big-btn" id="navClassIn"><i class="fas fa-chalkboard-teacher"></i><span>Class In</span></div>
          <div class="big-btn" id="navDiscussion"><i class="fas fa-comments"></i><span>AI Talk</span></div>
        </div>`;
      document.getElementById('navGame').onclick = ()=> setView('game');
      document.getElementById('navAITalk').onclick = ()=> setView('aitalk');
      document.getElementById('navClassIn').onclick = ()=> window.open(config.classInUrl||'https://www.classin.com/', '_blank');
      document.getElementById('navDiscussion').onclick = ()=> window.open(config.discussionUrl||'https://discussion.example.com/', '_blank');
    }

    function renderAiTalkView() {
      const buttons = config.aiTalkButtons || [];
      let buttonsHtml = '';
      if (buttons.length === 0) {
        buttonsHtml = `<p class="empty-message"><i class="fas fa-info-circle"></i> 暂无Role Play AI 链接，请老师添加。</p>`;
      } else {
        buttonsHtml = buttons.map(btn => `
          <div class="aitalk-btn" data-url="${btn.url.replace(/"/g, '&quot;')}">
            <i class="fas fa-external-link-alt"></i>
            <span>${btn.name}</span>
          </div>
        `).join('');
      }

      viewContainer.innerHTML = `
        <div>
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
            <i class="fas fa-comment-dots" style="font-size:2rem; color:#1e3c72;"></i>
            <h2 style="font-size:2rem;">AI Talk</h2>
          </div>
          <div class="aitalk-list">
            ${buttonsHtml}
          </div>
        </div>
      `;

      document.querySelectorAll('.aitalk-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const url = btn.dataset.url;
          if (url) window.open(url, '_blank');
        });
      });
    }

    function renderGameView() {
      const parts = config.gameParts || [];
      viewContainer.innerHTML = `<div style="padding:8px;"><h2>🎮 Game Parts</h2><div class="part-grid">${parts.map(p=>`<div class="part-card" data-part-id="${p.id}"><i class="fas fa-puzzle-piece"></i><h3>${p.name}</h3></div>`).join('')}</div></div>`;
      document.querySelectorAll('.part-card').forEach(c=> c.addEventListener('click', ()=> setView('partDetail', c.dataset.partId)));
    }

    function renderPartDetailView() {
      const part = config.gameParts.find(p=>p.id===currentPartId);
      if(!part) return setView('game');
      const games = part.games||[];
      viewContainer.innerHTML = `<div><h2>${part.name}</h2><div class="games-list">${games.map(g=>`<div class="game-btn" data-game-id="${g.id}"><i class="fas fa-play-circle"></i>${g.name}</div>`).join('')}</div><div id="iframeDisplay" class="iframe-container">点击游戏加载</div></div>`;
      const iframeDiv = document.getElementById('iframeDisplay');
      document.querySelectorAll('.game-btn').forEach(b=> b.addEventListener('click', ()=>{
        const g = part.games.find(g=>g.id===b.dataset.gameId);
        if(g) iframeDiv.innerHTML = g.embedCode;
      }));
    }

    function renderSettingView() {
      if (!settingAuthenticated) return setView('home');
      
      let sourceText = { cloud: '☁️ 云端配置', local: '💾 本地存储', default: '📄 默认配置' }[configSource];
      
      // AI Talk 管理部分 HTML
      let aiTalkHtml = '';
      (config.aiTalkButtons || []).forEach((btn, idx) => {
        aiTalkHtml += `
          <div class="aitalk-editor-item">
            <div class="flex-row" style="justify-content:space-between;">
              <strong><i class="fas fa-link"></i> 按钮 ${idx+1}</strong>
              <button class="btn-icon" data-action="deleteAiTalk" data-btn-id="${btn.id}"><i class="fas fa-trash"></i></button>
            </div>
            <div class="input-group">
              <label>重命名</label>
              <input type="text" data-field="aiTalkName" data-btn-id="${btn.id}" value="${btn.name.replace(/"/g, '&quot;')}">
            </div>
            <div class="input-group">
              <label>导入链接</label>
              <input type="text" data-field="aiTalkUrl" data-btn-id="${btn.id}" value="${btn.url.replace(/"/g, '&quot;')}">
            </div>
          </div>
        `;
      });

      // Game Parts 编辑部分 HTML
      let partsHtml = '';
      config.gameParts.forEach(part => {
        let gamesHtml = '';
        (part.games||[]).forEach(game => {
          gamesHtml += `<div class="game-editor-item">
            <div class="flex-row"><strong>${game.name}</strong><button class="btn-icon" data-action="deleteGame" data-part-id="${part.id}" data-game-id="${game.id}"><i class="fas fa-trash"></i></button></div>
            <div class="input-group"><label>名称</label><input type="text" data-part-id="${part.id}" data-game-id="${game.id}" data-field="gameName" value="${game.name.replace(/"/g,'&quot;')}"></div>
            <div class="input-group"><label>嵌入代码</label><textarea rows="3" data-part-id="${part.id}" data-game-id="${game.id}" data-field="embedCode">${game.embedCode.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea></div>
          </div>`;
        });
        partsHtml += `<div class="part-editor">
          <div class="flex-row"><h3>${part.name}</h3><div><button class="btn-icon" data-action="renamePart" data-part-id="${part.id}"><i class="fas fa-pen"></i></button><button class="btn-icon" data-action="deletePart" data-part-id="${part.id}"><i class="fas fa-trash-alt"></i></button></div></div>
          <div class="input-group"><label>Part名称</label><input type="text" data-part-id="${part.id}" data-field="partName" value="${part.name}"></div>
          ${gamesHtml}
          <button class="btn-outline" data-action="addGame" data-part-id="${part.id}"><i class="fas fa-plus"></i> 添加游戏</button>
        </div>`;
      });

      viewContainer.innerHTML = `
        <div>
          <div class="config-source-badge"><i class="fas fa-database"></i> 配置来源：${sourceText}</div>
          
          <div class="setting-section">
            <div class="setting-title"><i class="fas fa-key"></i> 基础设置</div>
            <div class="input-group"><label>设置密码</label><input type="text" id="settingPwd" value="${config.settingPassword}"></div>
            <div class="input-group"><label>ClassIn链接</label><input type="text" id="classInUrl" value="${config.classInUrl}"></div>
            <div class="input-group"><label>AI Talk链接</label><input type="text" id="discussionUrl" value="${config.discussionUrl}"></div>
          </div>
          
          <div class="setting-section">
            <div class="setting-title"><i class="fas fa-comment-dots"></i> Role Play AI 按钮管理</div>
            <p style="margin-bottom:16px;">添加、编辑或删除 Role Play AI 页面的跳转按钮。</p>
            ${aiTalkHtml}
            <button class="btn-outline" data-action="addAiTalk"><i class="fas fa-plus-circle"></i> 添加 Role Play AI 按钮</button>
          </div>

          <div class="setting-section">
            <div class="setting-title"><i class="fas fa-layer-group"></i> 部件与游戏管理</div>
            ${partsHtml}
            <div class="flex-row" style="margin-top:20px">
              <button class="btn-primary" id="addPartBtn"><i class="fas fa-plus"></i> 新建Part</button>
              <button class="btn-outline" id="resetDefaultBtn"><i class="fas fa-undo-alt"></i> 重置默认</button>
            </div>
          </div>
          
          <div class="setting-section">
            <div class="setting-title"><i class="fas fa-cloud-upload-alt"></i> 云端发布</div>
            <p style="margin-bottom:16px;">修改完成后，点击下方按钮立即发布。学生在首页点击右上角☁️即可获取最新内容。</p>
            <button class="btn-primary" id="publishCloudBtn"><i class="fas fa-cloud-upload-alt"></i> 发布到云端</button>
            <hr style="margin: 24px 0; border: none; border-top: 1px solid #ddd;">
            <div class="flex-row">
              <button class="btn-outline" id="exportConfigBtn"><i class="fas fa-download"></i> 导出JSON</button>
              <label class="btn-outline" for="importFileInput" style="cursor:pointer;"><i class="fas fa-upload"></i> 导入JSON</label>
              <input type="file" id="importFileInput" accept=".json,application/json" style="display:none;">
            </div>
          </div>
          
          <div class="flex-row" style="justify-content:flex-end;">
            <button class="btn-primary" id="logoutSettingBtn">退出设置</button>
          </div>
        </div>`;

      // --- 事件绑定 ---

      // 基础设置字段实时保存
      const baseInputs = {
        settingPwd: (v) => { config.settingPassword = v; },
        classInUrl: (v) => { config.classInUrl = v; },
        discussionUrl: (v) => { config.discussionUrl = v; }
      };
      Object.keys(baseInputs).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', (e) => {
          baseInputs[id](e.target.value);
          debouncedSave();
        });
      });

      // AI Talk 按钮字段实时保存
      viewContainer.querySelectorAll('[data-field="aiTalkName"], [data-field="aiTalkUrl"]').forEach(input => {
        input.addEventListener('input', (e) => {
          const btnId = e.target.dataset.btnId;
          const field = e.target.dataset.field;
          const button = (config.aiTalkButtons || []).find(b => b.id === btnId);
          if (button) {
            if (field === 'aiTalkName') button.name = e.target.value;
            else if (field === 'aiTalkUrl') button.url = e.target.value;
            debouncedSave();
          }
        });
      });

      // Part / Game 字段实时保存
      viewContainer.querySelectorAll('[data-field="partName"], [data-field="gameName"], [data-field="embedCode"]').forEach(el => {
        el.addEventListener('input', (e) => {
          const partId = e.target.dataset.partId;
          const gameId = e.target.dataset.gameId;
          const field = e.target.dataset.field;
          if (!partId) return;
          const part = config.gameParts.find(p => p.id === partId);
          if (!part) return;
          if (field === 'partName') part.name = e.target.value;
          else if (gameId) {
            const game = part.games.find(g => g.id === gameId);
            if (game) {
              if (field === 'gameName') game.name = e.target.value;
              else if (field === 'embedCode') game.embedCode = e.target.value;
            }
          }
          debouncedSave();
        });
      });

      // 通用按钮点击
      viewContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;

        if (action === 'addAiTalk') {
          config.aiTalkButtons = config.aiTalkButtons || [];
          config.aiTalkButtons.push({
            id: generateId('aitalk'),
            name: '新按钮',
            url: 'https://'
          });
          saveConfigToStorage();
          renderSettingView();
        }
        else if (action === 'deleteAiTalk') {
          const btnId = btn.dataset.btnId;
          config.aiTalkButtons = (config.aiTalkButtons || []).filter(b => b.id !== btnId);
          saveConfigToStorage();
          renderSettingView();
        }
        else if (action === 'addGame') {
          const part = config.gameParts.find(p => p.id === btn.dataset.partId);
          if (part) {
            part.games.push({ id: generateId('game'), name: '新游戏', embedCode: '<iframe width="500" height="380" src="https://"></iframe>' });
            saveConfigToStorage();
            renderSettingView();
          }
        }
        else if (action === 'deleteGame') {
          const part = config.gameParts.find(p => p.id === btn.dataset.partId);
          if (part) {
            part.games = part.games.filter(g => g.id !== btn.dataset.gameId);
            saveConfigToStorage();
            renderSettingView();
          }
        }
        else if (action === 'deletePart') {
          if (config.gameParts.length <= 1) return alert('至少保留一个Part');
          config.gameParts = config.gameParts.filter(p => p.id !== btn.dataset.partId);
          saveConfigToStorage();
          renderSettingView();
        }
        else if (action === 'renamePart') {
          const part = config.gameParts.find(p => p.id === btn.dataset.partId);
          if (part) {
            const n = prompt('新名称', part.name);
            if (n) { part.name = n; saveConfigToStorage(); renderSettingView(); }
          }
        }
      });

      document.getElementById('addPartBtn')?.addEventListener('click', () => {
        config.gameParts.push({ id: generateId('part'), name: '新Part', games: [] });
        saveConfigToStorage();
        renderSettingView();
      });
      document.getElementById('resetDefaultBtn')?.addEventListener('click', () => {
        if (confirm('重置为默认配置？')) {
          config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
          normalizeConfig(config);
          saveConfigToStorage();
          renderSettingView();
        }
      });
      document.getElementById('logoutSettingBtn')?.addEventListener('click', () => {
        settingAuthenticated = false;
        setView('home');
      });
      document.getElementById('publishCloudBtn')?.addEventListener('click', publishToCloud);
      document.getElementById('exportConfigBtn')?.addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(config, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `english_config.json`;
        a.click();
      });
      document.getElementById('importFileInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            config = { ...DEFAULT_CONFIG, ...imported };
            normalizeConfig(config);
            saveConfigToStorage();
            renderSettingView();
            showSnackbar('✅ 配置导入成功');
          } catch(ex) { alert('无效的配置文件'); }
          e.target.value = '';
        };
        reader.readAsText(file);
      });
    }

    function renderCurrentView() {
      if (currentView === 'home') renderHomeView();
      else if (currentView === 'aitalk') renderAiTalkView();
      else if (currentView === 'game') renderGameView();
      else if (currentView === 'partDetail') renderPartDetailView();
      else if (currentView === 'setting') renderSettingView();
    }

    // ---------- 初始化 ----------
    backButton.onclick = goBack;
    cloudRefreshBtn.onclick = () => loadConfigFromCloud(true);
    settingCornerBtn.onclick = enterSetting;

    submitPassword.onclick = () => { if(passwordCallback) passwordCallback(passwordInput.value); };
    cancelPassword.onclick = hidePasswordModal;
    passwordInput.addEventListener('keypress', (e) => { if(e.key==='Enter') submitPassword.click(); });

    // 启动加载
    loadConfigFromCloud(true).catch(() => {
      loadConfigFromStorage();
    });
    setView('home');
  })();
</script>
</body>
</html>
