<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>English Integrated Web</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e6f0f5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    #app {
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      max-height: 900px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      box-shadow: 0 25px 50px -8px rgba(0, 20, 30, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 头部导航 */
    .nav-header {
      padding: 20px 24px 8px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .nav-header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
      flex: 1;
    }

    .back-btn {
      background: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      color: #1e3c72;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .back-btn:hover {
      background: #1e3c72;
      color: white;
      transform: scale(0.96);
    }

    /* 主视图容器 */
    .view-container {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    /* 首页按钮网格 */
    .home-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      padding: 16px 8px;
    }

    .big-btn {
      background: white;
      border-radius: 32px;
      padding: 32px 16px;
      box-shadow: 0 12px 24px -8px rgba(0, 32, 64, 0.12);
      border: 1px solid rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: #1e2f4b;
    }

    .big-btn i {
      font-size: 3.5rem;
      color: #2a5298;
    }

    .big-btn span {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .big-btn:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 36px -12px #1e3c7250;
      background: #f0f7ff;
    }

    /* Part 按钮组 */
    .part-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 16px;
    }

    .part-card {
      background: white;
      border-radius: 28px;
      padding: 24px 28px;
      flex: 1 0 180px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
      border: 1px solid #fff;
      text-align: center;
      cursor: pointer;
      transition: 0.15s;
    }

    .part-card i {
      font-size: 2.5rem;
      color: #2e5a9c;
      margin-bottom: 12px;
    }

    .part-card h3 {
      font-size: 1.8rem;
      font-weight: 600;
    }

    .part-card:hover {
      background: #d9e9ff;
      transform: scale(0.98);
    }

    /* 游戏列表 (Part 详情) */
    .games-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 24px 0;
    }

    .game-btn {
      background: white;
      padding: 18px 24px;
      border-radius: 40px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid #eef4ff;
      font-size: 1.3rem;
      font-weight: 500;
      color: #10355e;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.15s;
    }

    .game-btn i {
      color: #2a5298;
      font-size: 1.4rem;
    }

    .game-btn:hover {
      background: #e3efff;
      border-color: #8bb3e0;
    }

    .iframe-container {
      margin-top: 28px;
      background: #ffffffc0;
      border-radius: 36px;
      padding: 20px;
      box-shadow: inset 0 1px 4px #00000008, 0 8px 18px #00000010;
      backdrop-filter: blur(4px);
      text-align: center;
    }

    iframe {
      border-radius: 24px;
      background: white;
      width: 100%;
      max-width: 500px;
      height: 380px;
      border: none;
      box-shadow: 0 6px 14px rgba(0,0,0,0.05);
    }

    /* setting 面板 */
    .setting-section {
      background: white;
      border-radius: 32px;
      padding: 24px;
      margin-bottom: 30px;
      box-shadow: 0 6px 14px #00000008;
    }

    .setting-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1e3c72;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: #2c3e50;
    }

    .input-group input, .input-group textarea {
      width: 100%;
      padding: 14px 18px;
      border-radius: 40px;
      border: 1.5px solid #dbe4f0;
      font-size: 1rem;
      background: #fafcff;
      transition: 0.2s;
    }

    .input-group textarea {
      border-radius: 28px;
      resize: vertical;
      font-family: monospace;
    }

    .input-group input:focus, .input-group textarea:focus {
      border-color: #2a5298;
      outline: none;
      background: white;
    }

    .part-editor {
      background: #f2f8ff;
      border-radius: 28px;
      padding: 20px;
      margin-top: 20px;
    }

    .game-editor-item {
      background: white;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid #cbddec;
    }

    .btn-icon {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #406e9e;
      padding: 8px;
      border-radius: 40px;
    }

    .btn-icon:hover {
      background: #d4e2f5;
    }

    .btn-primary {
      background: #1e3c72;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 16px #1e3c7240;
      transition: 0.15s;
      margin-right: 8px;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #1e3c72;
      color: #1e3c72;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
    }

    .flex-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .password-modal {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: #00000040;
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-card {
      background: white;
      padding: 32px;
      border-radius: 48px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 30px 50px #00000030;
    }

    .hidden {
      display: none !important;
    }

    .empty-message {
      color: #6b7f94;
      padding: 20px;
      font-style: italic;
    }

    .inline-code {
      background: #eef3fa;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #1e3c72;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- 顶部导航 -->
  <div class="nav-header">
    <button class="back-btn" id="backButton"><i class="fas fa-arrow-left"></i></button>
    <h1>📘 English Integrated Web</h1>
    <div style="width:44px;"></div> <!-- 占位 -->
  </div>

  <!-- 视图容器 -->
  <div id="viewContainer" class="view-container">
    <!-- 动态渲染视图 -->
  </div>
</div>

<!-- 密码模态框 -->
<div id="passwordModal" class="password-modal hidden">
  <div class="modal-card">
    <h2 style="margin-bottom:20px; color:#1e3c72;"><i class="fas fa-lock"></i> Enter Code</h2>
    <input type="password" id="passwordInput" placeholder="Setting password" style="width:100%; padding:16px; border-radius:60px; border:1.5px solid #ccc; margin-bottom:20px;">
    <div class="flex-row">
      <button class="btn-primary" id="submitPassword">Unlock</button>
      <button class="btn-outline" id="cancelPassword">Cancel</button>
    </div>
    <p id="passwordError" style="color:#c0392b; margin-top:12px;"></p>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 默认配置 (JSON结构) ----------
    const DEFAULT_CONFIG = {
      settingPassword: "1234",          // 默认密码
      aiTalkUrl: "https://weixin.qq.com/",  // 示例微信链接
      classInUrl: "https://www.classin.com/",
      gameParts: [
        {
          id: "part1",
          name: "Part 1",
          games: [
            {
              id: "game1",
              name: "Wordwall Game",
              embedCode: `<iframe style="max-width:100%" src="https://wordwall.net/embed/fc41e69b25a747f0a439d228a56fcf59?themeId=1&templateId=3&fontStackId=0" width="500" height="380" frameborder="0" allowfullscreen></iframe>`
            }
          ]
        },
        { id: "part2", name: "Part 2", games: [] },
        { id: "part3", name: "Part 3", games: [] }
      ]
    };

    // ---------- 全局状态 ----------
    let config = JSON.parse(JSON.stringify(DEFAULT_CONFIG)); // 深拷贝
    let currentView = 'home';        // home, game, partDetail, setting
    let currentPartId = null;        // 当前选中的part id
    let settingAuthenticated = false;
    let passwordCallback = null;     // 用于模态回调

    // DOM 元素
    const viewContainer = document.getElementById('viewContainer');
    const backButton = document.getElementById('backButton');
    const passwordModal = document.getElementById('passwordModal');
    const passwordInput = document.getElementById('passwordInput');
    const submitPassword = document.getElementById('submitPassword');
    const cancelPassword = document.getElementById('cancelPassword');
    const passwordError = document.getElementById('passwordError');

    // ---------- 初始化 / 本地存储 ----------
    function loadConfigFromStorage() {
      const stored = localStorage.getItem('english_integrated_config');
      if(stored) {
        try {
          const parsed = JSON.parse(stored);
          // 简易合并确保必要字段
          config = { ...DEFAULT_CONFIG, ...parsed };
          // 保证gameParts存在
          if(!config.gameParts || !Array.isArray(config.gameParts)) config.gameParts = DEFAULT_CONFIG.gameParts;
        } catch(e){ config = JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
      } else {
        config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
        saveConfigToStorage();
      }
    }
    function saveConfigToStorage() {
      localStorage.setItem('english_integrated_config', JSON.stringify(config));
    }

    // 重置默认（保留密码可选）
    function resetToDefault() {
      config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
      saveConfigToStorage();
    }

    // ---------- 辅助函数 ----------
    function generateId(prefix = 'id') {
      return prefix + '-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
    }

    // 导航
    function setView(view, partId = null) {
      currentView = view;
      currentPartId = partId;
      renderCurrentView();
    }

    function goBack() {
      if (currentView === 'home') return;
      if (currentView === 'game' || currentView === 'partDetail' || currentView === 'setting') {
        setView('home');
      } else {
        setView('home');
      }
    }

    // 密码弹窗
    function showPasswordModal(callback) {
      passwordCallback = callback;
      passwordModal.classList.remove('hidden');
      passwordInput.value = '';
      passwordError.innerText = '';
      passwordInput.focus();
    }

    function hidePasswordModal() {
      passwordModal.classList.add('hidden');
      passwordCallback = null;
    }

    // 进入setting (检查认证)
    function enterSetting() {
      if (settingAuthenticated) {
        setView('setting');
      } else {
        showPasswordModal((enteredPassword) => {
          if (enteredPassword === config.settingPassword) {
            settingAuthenticated = true;
            hidePasswordModal();
            setView('setting');
          } else {
            passwordError.innerText = 'Incorrect code. Try again.';
          }
        });
      }
    }

    // 渲染视图
    function renderCurrentView() {
      if (currentView === 'home') renderHomeView();
      else if (currentView === 'game') renderGameView();
      else if (currentView === 'partDetail') renderPartDetailView();
      else if (currentView === 'setting') renderSettingView();
    }

    // ---------- 首页 ----------
    function renderHomeView() {
      let html = `
        <div class="home-grid">
          <div class="big-btn" id="navGame">
            <i class="fas fa-gamepad"></i>
            <span>Game</span>
          </div>
          <div class="big-btn" id="navAITalk">
            <i class="fas fa-comment-dots"></i>
            <span>AI Talk</span>
          </div>
          <div class="big-btn" id="navClassIn">
            <i class="fas fa-users-class"></i>
            <span>Class In</span>
          </div>
          <div class="big-btn" id="navSetting">
            <i class="fas fa-sliders-h"></i>
            <span>Setting</span>
          </div>
        </div>
      `;
      viewContainer.innerHTML = html;
      document.getElementById('navGame').addEventListener('click', ()=> setView('game'));
      document.getElementById('navAITalk').addEventListener('click', ()=>{
        const url = config.aiTalkUrl || 'https://weixin.qq.com/';
        window.open(url, '_blank');
      });
      document.getElementById('navClassIn').addEventListener('click', ()=>{
        const url = config.classInUrl || 'https://www.classin.com/';
        window.open(url, '_blank');
      });
      document.getElementById('navSetting').addEventListener('click', enterSetting);
    }

    // ---------- Game 视图 (Part列表) ----------
    function renderGameView() {
      const parts = config.gameParts || [];
      let partsHtml = parts.map(part => `
        <div class="part-card" data-part-id="${part.id}">
          <i class="fas fa-puzzle-piece"></i>
          <h3>${part.name}</h3>
        </div>
      `).join('');
      
      viewContainer.innerHTML = `
        <div style="padding:8px;">
          <h2 style="font-size:2rem; margin-bottom:8px; color:#1e3c72;">🎮 Game Parts</h2>
          <p style="margin-bottom:16px; opacity:0.7;">Select a part to play</p>
          <div class="part-grid">
            ${partsHtml || '<p class="empty-message">No parts. Add in Settings.</p>'}
          </div>
        </div>
      `;
      document.querySelectorAll('.part-card').forEach(card => {
        card.addEventListener('click', (e) => {
          const partId = card.dataset.partId;
          const part = config.gameParts.find(p => p.id === partId);
          if(part) setView('partDetail', partId);
        });
      });
    }

    // ---------- Part 详情 (游戏列表 + iframe) ----------
    function renderPartDetailView() {
      const part = config.gameParts.find(p => p.id === currentPartId);
      if (!part) { setView('game'); return; }
      
      const games = part.games || [];
      let gamesHtml = '';
      if (games.length === 0) {
        gamesHtml = `<p class="empty-message"><i class="fas fa-info-circle"></i> No games in this part. Add in Settings.</p>`;
      } else {
        gamesHtml = games.map(game => `
          <div class="game-btn" data-game-id="${game.id}">
            <i class="fas fa-play-circle"></i>
            <span>${game.name}</span>
          </div>
        `).join('');
      }

      viewContainer.innerHTML = `
        <div>
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
            <i class="fas fa-cube" style="font-size:2rem; color:#1e3c72;"></i>
            <h2 style="font-size:2rem;">${part.name}</h2>
          </div>
          <div class="games-list" id="gamesListContainer">
            ${gamesHtml}
          </div>
          <div id="iframeDisplay" class="iframe-container">
            <p style="color:#6b7f94;"><i class="fas fa-arrow-up"></i> Click a game above to load</p>
          </div>
        </div>
      `;

      const iframeContainer = document.getElementById('iframeDisplay');
      // 绑定游戏按钮
      document.querySelectorAll('.game-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const gameId = btn.dataset.gameId;
          const game = part.games.find(g => g.id === gameId);
          if (game && game.embedCode) {
            iframeContainer.innerHTML = game.embedCode;
          } else {
            iframeContainer.innerHTML = `<p>Invalid game code</p>`;
          }
        });
      });
    }

    // ---------- Setting 视图 (复杂管理) ----------
    function renderSettingView() {
      if (!settingAuthenticated) { setView('home'); return; }
      
      let partsHtml = '';
      config.gameParts.forEach((part, idx) => {
        const games = part.games || [];
        let gamesEditHtml = '';
        games.forEach((game, gIdx) => {
          gamesEditHtml += `
            <div class="game-editor-item">
              <div class="flex-row" style="justify-content:space-between;">
                <strong><i class="fas fa-gamepad"></i> Game ${gIdx+1}</strong>
                <button class="btn-icon" data-action="deleteGame" data-part-id="${part.id}" data-game-id="${game.id}"><i class="fas fa-trash"></i></button>
              </div>
              <div class="input-group">
                <label>Game Name</label>
                <input type="text" data-part-id="${part.id}" data-game-id="${game.id}" data-field="gameName" value="${game.name.replace(/"/g, '&quot;')}">
              </div>
              <div class="input-group">
                <label>Embed Code (iframe)</label>
                <textarea rows="3" data-part-id="${part.id}" data-game-id="${game.id}" data-field="embedCode">${game.embedCode.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                <small>Paste full iframe code</small>
              </div>
            </div>
          `;
        });

        partsHtml += `
          <div class="part-editor">
            <div class="flex-row" style="justify-content:space-between;">
              <h3 style="font-size:1.6rem;">📌 ${part.name}</h3>
              <div>
                <button class="btn-icon" data-action="renamePart" data-part-id="${part.id}"><i class="fas fa-pen"></i></button>
                <button class="btn-icon" data-action="deletePart" data-part-id="${part.id}"><i class="fas fa-trash-alt"></i></button>
              </div>
            </div>
            <div class="input-group">
              <label>Part Name</label>
              <input type="text" data-part-id="${part.id}" data-field="partName" value="${part.name.replace(/"/g, '&quot;')}">
            </div>
            <div style="margin: 16px 0 8px;"><i class="fas fa-joystick"></i> Games in this part</div>
            ${gamesEditHtml}
            <button class="btn-outline" style="margin-top:12px;" data-action="addGame" data-part-id="${part.id}"><i class="fas fa-plus-circle"></i> Add Game</button>
          </div>
        `;
      });

      viewContainer.innerHTML = `
        <div>
          <div class="setting-section">
            <div class="setting-title"><i class="fas fa-key"></i> Security & Links</div>
            <div class="input-group">
              <label>Setting Password</label>
              <input type="text" id="settingPasswordInput" value="${config.settingPassword}">
            </div>
            <div class="input-group">
              <label>AI Talk (WeChat link)</label>
              <input type="text" id="aiTalkUrlInput" value="${config.aiTalkUrl}">
            </div>
            <div class="input-group">
              <label>ClassIn Link</label>
              <input type="text" id="classInUrlInput" value="${config.classInUrl}">
            </div>
          </div>

          <div class="setting-section">
            <div class="setting-title"><i class="fas fa-layer-group"></i> Game Parts Management</div>
            ${partsHtml}
            <div style="margin-top:20px;">
              <button class="btn-primary" id="addPartBtn"><i class="fas fa-folder-plus"></i> Add New Part</button>
              <button class="btn-outline" id="resetDefaultBtn"><i class="fas fa-undo-alt"></i> Reset to Default</button>
            </div>
            <p style="margin-top:16px; font-size:0.9rem;"><i class="far fa-save"></i> Changes save automatically when you edit fields or click buttons.</p>
          </div>
          <div class="flex-row" style="justify-content:flex-end;">
            <button class="btn-primary" id="logoutSettingBtn"><i class="fas fa-sign-out-alt"></i> Exit Setting</button>
          </div>
        </div>
      `;

      // 绑定各类事件 (使用事件委托)
      const container = viewContainer;

      // 全局链接和密码保存
      const pwdInput = document.getElementById('settingPasswordInput');
      const aiInput = document.getElementById('aiTalkUrlInput');
      const classInput = document.getElementById('classInUrlInput');
      const updateLinksAndPwd = () => {
        config.settingPassword = pwdInput.value;
        config.aiTalkUrl = aiInput.value;
        config.classInUrl = classInput.value;
        saveConfigToStorage();
      };
      pwdInput.addEventListener('change', updateLinksAndPwd);
      aiInput.addEventListener('change', updateLinksAndPwd);
      classInput.addEventListener('change', updateLinksAndPwd);

      // 所有输入框修改保存
      container.addEventListener('change', (e) => {
        const target = e.target;
        const field = target.dataset.field;
        const partId = target.dataset.partId;
        const gameId = target.dataset.gameId;
        if (!partId) return;
        const part = config.gameParts.find(p => p.id === partId);
        if (!part) return;

        if (field === 'partName') {
          part.name = target.value;
        } else if (field === 'gameName' && gameId) {
          const game = part.games.find(g => g.id === gameId);
          if (game) game.name = target.value;
        } else if (field === 'embedCode' && gameId) {
          const game = part.games.find(g => g.id === gameId);
          if (game) game.embedCode = target.value;  // 直接保存原始字符
        }
        saveConfigToStorage();
      });

      // 按钮点击委托
      container.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;
        const partId = btn.dataset.partId;
        const gameId = btn.dataset.gameId;

        if (action === 'addGame') {
          const part = config.gameParts.find(p => p.id === partId);
          if (part) {
            const newGame = {
              id: generateId('game'),
              name: 'New Game',
              embedCode: '<iframe width="500" height="380" src="https://"></iframe>'
            };
            part.games.push(newGame);
            saveConfigToStorage();
            renderSettingView();
          }
        } else if (action === 'deleteGame') {
          const part = config.gameParts.find(p => p.id === partId);
          if (part) {
            part.games = part.games.filter(g => g.id !== gameId);
            saveConfigToStorage();
            renderSettingView();
          }
        } else if (action === 'deletePart') {
          if (config.gameParts.length <= 1) { alert('Keep at least one part.'); return; }
          config.gameParts = config.gameParts.filter(p => p.id !== partId);
          saveConfigToStorage();
          renderSettingView();
        } else if (action === 'renamePart') {
          const newName = prompt('Enter new part name:', config.gameParts.find(p=>p.id===partId)?.name);
          if (newName) {
            const part = config.gameParts.find(p=>p.id===partId);
            if(part) { part.name = newName; saveConfigToStorage(); renderSettingView(); }
          }
        }
      });

      document.getElementById('addPartBtn').addEventListener('click', () => {
        const newPart = {
          id: generateId('part'),
          name: 'New Part',
          games: []
        };
        config.gameParts.push(newPart);
        saveConfigToStorage();
        renderSettingView();
      });

      document.getElementById('resetDefaultBtn').addEventListener('click', () => {
        if(confirm('Reset all settings to default? This cannot be undone.')) {
          resetToDefault();
          renderSettingView();
        }
      });

      document.getElementById('logoutSettingBtn').addEventListener('click', () => {
        settingAuthenticated = false;
        setView('home');
      });
    }

    // ---------- 事件绑定 ----------
    backButton.addEventListener('click', goBack);

    submitPassword.addEventListener('click', () => {
      const pwd = passwordInput.value;
      if (passwordCallback) passwordCallback(pwd);
    });
    cancelPassword.addEventListener('click', hidePasswordModal);
    passwordInput.addEventListener('keypress', (e) => { if(e.key==='Enter') submitPassword.click(); });

    // 点击模态背景不关闭 (简洁)
    
    // 初始化
    loadConfigFromStorage();
    setView('home');

    // 确保settingAuthenticated 重置
    window.addEventListener('load', ()=> { settingAuthenticated = false; });
  })();
</script>
</body>
</html>
